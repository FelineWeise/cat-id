services:
  cat-id-staging:
    image: ${CAT_ID_IMAGE:-ghcr.io/felineweise/cat-id:latest}
    container_name: cat-id-staging-app
    restart: unless-stopped
    env_file:
      - ./env/staging.env
    expose:
      - "8000"
    networks:
      - cat-id-staging-net

networks:
  cat-id-staging-net:
    name: cat-id-staging-net
    driver: bridge
